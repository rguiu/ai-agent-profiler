# AI Agent Profiler configuration.
# Copy to config.toml and edit. config.toml is gitignored (may hold overrides).
# Ports and secrets can also be set via env vars (e.g. AAP_PORT, AAP_CONFIG).

[server]
port = 8080
host = "127.0.0.1"

[sessions]
# Start a new "unattributed" session after this many ms of inactivity
# (only used for traffic that arrives without a launcher-assigned session id).
idleTimeoutMs = 300000

[storage]
# Directory for the SQLite index (aap.sqlite) and raw NDJSON traces (traces/).
dir = "data"

# Provider routes. The request path prefix /<session_id>/<provider>/ selects one.
[providers.anthropic]
upstream = "https://api.anthropic.com"

[providers.openai]
upstream = "https://api.openai.com"

# DeepSeek (OpenAI-compatible). `aap run opencode` auto-routes providers via
# OPENCODE_CONFIG_CONTENT (base path defaults to /v1; set apiPath to override).
[providers.deepseek]
upstream = "https://api.deepseek.com"

# AWS Bedrock. When CLAUDE_CODE_USE_BEDROCK=1, `aap run claude` overrides
# AWS_ENDPOINT_URL_BEDROCK_RUNTIME to route Bedrock traffic through the proxy.
# Set the upstream to your region's bedrock-runtime endpoint.
[providers.bedrock]
upstream = "https://bedrock-runtime.eu-west-1.amazonaws.com"

# Optimize layer: rewrites request bodies to reduce token waste in long sessions.
# Enable in config or override at runtime with `aap serve --optimize`.
[optimize]
enabled = false               # set true to always optimise without --optimize flag
dedup = true                  # suppress identical tool re-reads (unchanged content)
truncate = true               # head+tail truncation for large results
stablePrefix = true           # canonicalise tool defs for prompt-cache stability
pruneStale = true             # replace old tool results with compact summaries
suppressReread = true         # suppress reads of files just written
collapseSystem = true         # collapse repeated system prompts to a hash stub
stripToolDefs = false         # remove tool defs after N requests (aggressive — may break)
truncateThreshold = 4096      # bytes above which truncation kicks in
pruneAfterTurns = 6           # prune results older than N assistant turns
suppressWithinTurns = 2       # suppress re-reads within N turns of a write
stripToolDefsAfter = 3        # strip tools after this many requests (if stripToolDefs=true)

# Pricing tables (never hardcoded in source). Keyed by model name; rates are
# per million tokens. Used by `aap parse` to estimate cost. Check current prices.
# cacheInputPerMTok is optional — if set, cached tokens are charged at this
# rate instead of inputPerMTok (e.g. Anthropic charges 90% less for cache reads).
# [pricing."claude-sonnet-4-20250514"]
# inputPerMTok = 3.0
# outputPerMTok = 15.0
# cacheInputPerMTok = 0.30
# [pricing."deepseek-chat"]
# inputPerMTok = 0.27
# outputPerMTok = 1.10
