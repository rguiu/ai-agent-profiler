# AI Agent Profiler configuration.
# Copy to config.toml and edit. config.toml is gitignored (may hold overrides).
# Ports and secrets can also be set via env vars (e.g. AAP_PORT, AAP_CONFIG).

[server]
port = 8080
host = "127.0.0.1"

[sessions]
# Start a new "unattributed" session after this many ms of inactivity
# (only used for traffic that arrives without a launcher-assigned session id).
idleTimeoutMs = 300000

[storage]
# Directory for the SQLite index (aap.sqlite) and raw NDJSON traces (traces/).
dir = "data"

# Provider routes. The request path prefix /<session_id>/<provider>/ selects one.
[providers.anthropic]
upstream = "https://api.anthropic.com"

[providers.openai]
upstream = "https://api.openai.com"

# DeepSeek (OpenAI-compatible). `aap run opencode` auto-routes providers via
# OPENCODE_CONFIG_CONTENT (base path defaults to /v1; set apiPath to override).
[providers.deepseek]
upstream = "https://api.deepseek.com"

# AWS Bedrock. When CLAUDE_CODE_USE_BEDROCK=1, `aap run claude` overrides
# AWS_ENDPOINT_URL_BEDROCK_RUNTIME to route Bedrock traffic through the proxy.
# Set the upstream to your region's bedrock-runtime endpoint.
[providers.bedrock]
upstream = "https://bedrock-runtime.eu-west-1.amazonaws.com"

# Optimize layer: rewrites request bodies to reduce token waste in long sessions.
# Enable in config or override at runtime with `aap serve --optimize`.
[optimize]
enabled = false               # set true to always optimise without --optimize flag
profile = "auto"              # auto|default|cache-safe. auto disables prefix-editing
                              # strategies (collapseSystem/pruneUnusedTools/pruneStale)
                              # for prefix-cache providers (deepseek) where they backfire;
                              # cache-safe forces this everywhere; default keeps full layer.
dedup = true                  # suppress identical tool re-reads (unchanged content)
truncate = true               # head+tail truncation for large results
stablePrefix = true           # canonicalise tool defs for prompt-cache stability
pruneStale = true             # replace old tool results with compact summaries
stableTruncate = false        # cache-safe: truncate large tool results in place with a
                              # content-only (position-independent) transform, so bytes are
                              # identical every request. Auto-enabled for deepseek via profile.
shapeTestOutput = false       # cache-safe: strip passing-test spam/ANSI/dup lines from test
                              # & build output deterministically. Auto-enabled for deepseek.
prefixProbe = false           # diagnostic: log prefix-cache stability between consecutive
                              # requests (flags accidental prefix edits). Auto-on for deepseek.
frozenCompact = false         # long sessions: fold old messages into ONE frozen summary once
                              # context crosses compactThreshold, then keep those bytes stable
                              # (rare reset, amortised over later turns). Auto-on for deepseek.
suppressReread = true         # suppress reads of files just written
collapseSystem = true         # collapse repeated system prompts to a hash stub
pruneUnusedTools = true       # drop tool defs never called (after pruneUnusedToolsAfter)
truncateThreshold = 4096      # bytes above which truncation kicks in
pruneAfterTurns = 6           # prune results older than N assistant turns
suppressWithinTurns = 2       # suppress re-reads within N turns of a write
pruneUnusedToolsAfter = 10    # drop never-called tool defs after this many requests
compactThreshold = 60000      # frozenCompact: emitted-context token budget before folding
compactKeepTail = 20          # frozenCompact: recent messages always kept full

# Pricing tables (never hardcoded in source). Keyed by model name; rates are
# per million tokens. Used by `aap parse` to estimate cost. Check current prices.
# cacheInputPerMTok is optional — if set, cache READS are charged at this rate
# instead of inputPerMTok (e.g. Anthropic charges 90% less for cache reads).
# cacheWritePerMTok is optional — cache WRITES (Anthropic cache_creation /
# Bedrock cacheWriteInputTokens) are charged at this rate (Anthropic = 1.25x
# input). If unset, writes fall back to inputPerMTok.
# [pricing."claude-sonnet-4-20250514"]
# inputPerMTok = 3.0
# outputPerMTok = 15.0
# cacheInputPerMTok = 0.30
# cacheWritePerMTok = 3.75
# [pricing."deepseek-chat"]
# inputPerMTok = 0.27
# outputPerMTok = 1.10

# Bedrock note: cost is ALWAYS computed locally from these rates — Bedrock
# responses report token usage, never a dollar amount. The key must match the
# model id Bedrock reports (from the request path, e.g. the whole
# "eu.anthropic.claude-..." string), not the short name. Run one call, then
# `aap sessions`/`aap export` to see the exact model string, and key on it.
# cacheInputPerMTok matters for A/B accuracy (cache reads are ~10% of input).
# [pricing."eu.anthropic.claude-sonnet-4-20250514-v1:0"]
# inputPerMTok = 3.0
# outputPerMTok = 15.0
# cacheInputPerMTok = 0.30
# cacheWritePerMTok = 3.75
